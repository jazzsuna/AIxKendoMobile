name: aikendo_mobile
description: 剣道素振り解析 - スマートフォン版
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 姿勢推定 (Google ML Kit / MediaPipe)
  google_mlkit_pose_detection: ^0.12.0

  # 動画選択
  image_picker: ^1.1.0

  # フレーム抽出 (ffmpeg)
  ffmpeg_kit_flutter_min_gpl: ^6.0.3

  # ファイルパス
  path_provider: ^2.1.4

  # スコアチャート
  fl_chart: ^0.69.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
